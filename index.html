<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Trading Bitget Futures - Stratégie MACD TOP 20</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="version">Version <span id="version">1.0.0</span></div>
    
    <div class="container">
        <div class="header">
            <h1>Bot Trading Bitget Futures</h1>
            <p>Stratégie MACD TOP 20</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="status">
                    <div class="status-dot"></div>
                    <span>Status: Offline</span>
                </div>
                
                <form id="apiForm">
                    <div class="form-group">
                        <label for="apiKey">API Key</label>
                        <input type="text" id="apiKey" required>
                    </div>
                    <div class="form-group">
                        <label for="apiSecret">API Secret</label>
                        <input type="password" id="apiSecret" required>
                    </div>
                    <button type="submit" class="btn">Initialize API</button>
                </form>

                <div class="form-group" style="margin-top: 20px;">
                    <button id="startBtn" class="btn btn-success">Start Bot</button>
                    <button id="stopBtn" class="btn btn-danger">Stop Bot</button>
                </div>
            </div>

            <div class="card">
                <h3>Top 20 Pairs</h3>
                <div id="topPairs" class="top20-list"></div>
            </div>

            <div class="card">
                <h3>Balance</h3>
                <div id="balance"></div>
            </div>

            <div class="card">
                <h3>Positions</h3>
                <div id="positions"></div>
            </div>

            <div class="card">
                <h3>Logs</h3>
                <div id="logs" class="logs"></div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
